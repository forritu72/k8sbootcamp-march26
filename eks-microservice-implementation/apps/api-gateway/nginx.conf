events {
    worker_connections 1024;
}

http {
    # Use Docker's internal DNS
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name localhost;

        # Define upstream variables for runtime DNS resolution
        set $product_service product-service:8001;
        set $user_service user-service:8002;
        set $cart_service cart-service:8003;
        set $order_service order-service:8004;
        set $payment_service payment-service:8005;

        # Product Service routes
        location /api/products {
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;

            # Handle OPTIONS request
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            rewrite ^/api/products(.*)$ /api/v1/products$1 break;
            proxy_pass http://$product_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # User Service routes
        location /api/users {
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;

            # Handle OPTIONS request
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            rewrite ^/api/users(.*)$ /api/v1/users$1 break;
            proxy_pass http://$user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Cart Service routes
        location /api/cart {
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;

            # Handle OPTIONS request
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            rewrite ^/api/cart(.*)$ /api/v1/cart$1 break;
            proxy_pass http://$cart_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # Order Service routes
        location /api/orders {
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;

            # Handle OPTIONS request
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            rewrite ^/api/orders(.*)$ /api/v1/orders$1 break;
            proxy_pass http://$order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # Payment Service routes
        location /api/payments {
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;

            # Handle OPTIONS request
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            rewrite ^/api/payments(.*)$ /api/v1/payments$1 break;
            proxy_pass http://$payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
