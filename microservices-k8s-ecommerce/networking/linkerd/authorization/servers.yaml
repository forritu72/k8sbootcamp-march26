# Linkerd Server Definitions
# Defines what ports/protocols to protect for each service

---
# API Gateway
apiVersion: policy.linkerd.io/v1beta2
kind: Server
metadata:
  name: api-gateway-server
  namespace: ecommerce
  labels:
    app: api-gateway
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  port: 80
  proxyProtocol: HTTP/1

---
# Product Service
apiVersion: policy.linkerd.io/v1beta2
kind: Server
metadata:
  name: product-service-server
  namespace: ecommerce
  labels:
    app: product-service
spec:
  podSelector:
    matchLabels:
      app: product-service
  port: 8001
  proxyProtocol: HTTP/1

---
# User Service
apiVersion: policy.linkerd.io/v1beta2
kind: Server
metadata:
  name: user-service-server
  namespace: ecommerce
  labels:
    app: user-service
spec:
  podSelector:
    matchLabels:
      app: user-service
  port: 8002
  proxyProtocol: HTTP/1

---
# Cart Service
apiVersion: policy.linkerd.io/v1beta2
