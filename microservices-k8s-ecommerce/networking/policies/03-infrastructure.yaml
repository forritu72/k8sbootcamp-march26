# CNPG Databases - allow only from respective services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: databases-policy
  namespace: ecommerce
spec:
  podSelector:
    matchLabels:
      cnpg.io/podRole: instance
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - product-service
                  - user-service
                  - order-service
                  - payment-service
      ports:
        - port: 5432
  egress:
    # Allow CNPG replication between instances
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/podRole: instance
      ports:
        - port: 5432
---
# Redis - only cart-service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-policy
  namespace: ecommerce
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cart-service
      ports:
        - port: 6379
---
# RabbitMQ - order and notification services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-policy
  namespace: ecommerce
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: order-service
        - podSelector:
            matchLabels:
              app: notification-service
      ports:
        - port: 5672
        - port: 15672
