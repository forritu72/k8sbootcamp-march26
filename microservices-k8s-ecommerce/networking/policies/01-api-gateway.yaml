# API Gateway - entry point for all external traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-policy
  namespace: ecommerce
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []  # Allow from anywhere (external)
      ports:
        - port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: product-service
      ports:
        - port: 8001
    - to:
        - podSelector:
            matchLabels:
              app: user-service
      ports:
        - port: 8002
    - to:
        - podSelector:
            matchLabels:
              app: cart-service
      ports:
        - port: 8003
    - to:
        - podSelector:
            matchLabels:
              app: order-service
      ports:
        - port: 8004
    - to:
        - podSelector:
            matchLabels:
              app: payment-service
      ports:
        - port: 8005
    - to:
        - podSelector:
            matchLabels:
              app: notification-service
      ports:
        - port: 8006
