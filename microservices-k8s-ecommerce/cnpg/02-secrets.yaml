# Secrets for CNPG PostgreSQL Clusters
#
# CNPG can manage secrets automatically, but we define them explicitly
# to maintain compatibility with existing services and use known credentials.
#
# Secret naming convention for CNPG:
#   <cluster-name>-superuser  - PostgreSQL superuser (postgres)
#   <cluster-name>-app        - Application user credentials
#
# The 'app' secret is what your services should use.
# ============================================================

---
# Products Database Secrets
apiVersion: v1
kind: Secret
metadata:
  name: products-superuser
  namespace: ecommerce
  labels:
    cnpg.io/cluster: products
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: postgres_superuser_123
---
apiVersion: v1
kind: Secret
metadata:
  name: products-app
  namespace: ecommerce
  labels:
    cnpg.io/cluster: products
type: kubernetes.io/basic-auth
stringData:
  username: ecommerce_user
  password: secure_password_123
  # Connection details (optional, CNPG adds these automatically)
  dbname: products
  host: products-rw
  port: "5432"

