# Custom Resource Definition for SimpleApp
# This defines the schema for our custom resource

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: simpleapps.apps.example.com
spec:
  # API group - resources will be at apps.example.com/v1
  group: apps.example.com

  names:
    kind: SimpleApp           # Kind in YAML
    listKind: SimpleAppList   # Kind for lists
    plural: simpleapps        # URL path: /apis/apps.example.com/v1/simpleapps
    singular: simpleapp       # kubectl get simpleapp
    shortNames:
      - sapp                  # kubectl get sapp

  # Namespaced means one per namespace (vs Cluster = global)
  scope: Namespaced

  versions:
    - name: v1
      served: true      # Enable this version
      storage: true     # Store data in this version

      # Schema defines what fields are allowed
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  description: "Container image to deploy"
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 1
                  description: "Number of pod replicas"
                port:
                  type: integer
                  minimum: 1
                  maximum: 65535
                  default: 80
                  description: "Container port to expose"
                message:
                  type: string
                  default: "Hello from SimpleApp!"
                  description: "Message to display (for demo purposes)"

            # Status is updated by the operator
            status:
              type: object
              properties:
                availableReplicas:
                  type: integer
                phase:
                  type: string
                  enum: ["Pending", "Running", "Failed"]
                lastUpdated:
                  type: string

      # Enable status subresource (allows PATCH to /status)
      subresources:
        status: {}

      # Columns shown in kubectl get simpleapps
      additionalPrinterColumns:
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
