name: CI Pipeline

on:
  pull_request:
    branches:
      - main

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # Secret scanning with gitleaks
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Lint and test Go services in parallel using matrix
  go-services:
    name: Go - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - product-service
          - order-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.service }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.service }}-

      - name: Install dependencies
        working-directory: apps/services/${{ matrix.service }}
        run: go mod download

      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: apps/services/${{ matrix.service }}
          args: --timeout=5m

      - name: Run tests
        working-directory: apps/services/${{ matrix.service }}
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: apps/services/${{ matrix.service }}/coverage.out

  # Lint and test Node.js services in parallel using matrix
  node-services:
    name: Node.js - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - cart-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: apps/services/${{ matrix.service }}
        run: npm ci || npm install

      - name: Lint
        working-directory: apps/services/${{ matrix.service }}
        run: npm run lint || echo "Lint script not configured, skipping..."

      - name: Run tests
        working-directory: apps/services/${{ matrix.service }}
        run: npm test
        env:
          JWT_SECRET: test-secret-key-for-ci

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: apps/services/${{ matrix.service }}/coverage/

  # Lint and test Python services in parallel using matrix
  python-services:
    name: Python - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - payment-service
          - notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: apps/services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: apps/services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: apps/services/${{ matrix.service }}
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        working-directory: apps/services/${{ matrix.service }}
        run: pytest tests/ -v --cov=. --cov-report=xml
        env:
          JWT_SECRET: test-secret-key-for-ci
          RAZORPAY_KEY_ID: test_key
          RAZORPAY_KEY_SECRET: test_secret

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: apps/services/${{ matrix.service }}/coverage.xml

  # Build and scan Docker images with Trivy
  docker-scan:
    name: Docker Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [go-services, node-services, python-services]
    strategy:
      fail-fast: false
      matrix:
        service:
          - product-service
          - order-service
          - user-service
          - cart-service
          - payment-service
          - notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/services/${{ matrix.service }}
          push: false
          load: true
          tags: ${{ matrix.service }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.service }}:scan'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'

  # Summary job
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, go-services, node-services, python-services, docker-scan]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "Secret Scan: ${{ needs.secret-scan.result }}"
          echo "Go Services: ${{ needs.go-services.result }}"
          echo "Node Services: ${{ needs.node-services.result }}"
          echo "Python Services: ${{ needs.python-services.result }}"
          echo "Docker Scan: ${{ needs.docker-scan.result }}"

      - name: Fail if any job failed
        if: |
          needs.secret-scan.result == 'failure' ||
          needs.go-services.result == 'failure' ||
          needs.node-services.result == 'failure' ||
          needs.python-services.result == 'failure' ||
          needs.docker-scan.result == 'failure'
        run: exit 1
